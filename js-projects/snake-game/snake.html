<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="snake.css" />
    <title>Snake-Game</title>
  </head>
  <body class="bg-gray-900 text-white">
    <main class="position">
      <div
        class="gameover absolute opacity-0 flex flex-col items-center top-[10%] w-full"
      >
        <h1 class="text-7xl font-bold text-center text-pink-500">Game Over</h1>
        <button
          class="restart m-5 inline-flex text-white bg-pink-500 border-0 py-2 px-6 focus:outline-none hover:bg-pink-600 rounded text-lg"
        >
          Restart
        </button>
      </div>
      <div class="info w-full flex justify-evenly border-2 p-6">
        <div>
          <h3>
            High Score:
            <span class="hscore">0</span>
          </h3>
        </div>
        <div>
          <h3>
            Score:
            <span class="score">0</span>
          </h3>
        </div>
        <div>
          <h3>
            Time:
            <span class="timer">00:00</span>
          </h3>
        </div>
      </div>
      <div class="board h-[76vh] border mx-14 my-7"></div>
    </main>
    <script src="snake.js"></script>
  </body>
</html>
