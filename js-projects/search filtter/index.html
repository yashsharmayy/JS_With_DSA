<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Search UI</title>

    <style>
      body {
        height: full;
        background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e")
          no-repeat center/cover;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: Arial;
      }

      .search-box input {
        padding: 10px 20px;
        width: 280px;
        border-radius: 25px;
        border: none;
        outline: none;
        margin-bottom: 20px;
      }
      .cards {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
      }

      .card {
        width: 220px;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 15px;
        text-align: center;
        padding: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .card img {
        width: 100%;
        height: 140px;
        object-fit: cover;
        border-radius: 10px;
      }

      .card h3 {
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="search-box">
      <input type="text" placeholder="Search user..." />
    </div>

    <div class="cards"></div>
    <script src="script.js"></script>
  </body>
</html>
