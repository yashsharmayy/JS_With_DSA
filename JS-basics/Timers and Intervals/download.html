<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Download UI - Dark Theme</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #121212;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #fff;
      }

      .box {
        background: #1e1e1e;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        text-align: center;
        width: 280px;
      }

      h3 {
        margin-bottom: 15px;
      }

      button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #bb86fc;
        color: #fff;
        cursor: pointer;
      }

      button:hover {
        background: #9a67ea;
      }

      .progress {
        width: 100%;
        height: 10px;
        background: #333;
        border-radius: 10px;
        margin: 15px 0;
        overflow: hidden;
      }

      .bar {
        height: 100%;
        width: 0%;
        background: #bb86fc;
        transition: width 0.2s;
      }

      #text {
        font-size: 14px;
        margin-top: 5px;
        color: #ccc;
      }
      .alertbanner {
        position: absolute;
        background: #bb86fc;
        text-align: center;
        transform: translate(-50%);
        transition: all cubic-bezier(0.19, 1, 0.22, 1) 0.5s;
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        top: -120px;
        left: 50%;
        opacity: 0;
        width: 200px;
        border-radius: 10px;
        padding: 20px;
      }
    </style>
  </head>
  <body>
    <div class="alertbanner">Downloaded</div>

    <div class="box">
      <h3>Download File</h3>

      <div class="progress">
        <div class="bar" id="bar"></div>
      </div>

      <p id="text">0%</p>

      <button onclick="download()">Download</button>
    </div>

    <script>
      function download() {
        let progress = 0;
        let bar = document.getElementById("bar");
        let text = document.getElementById("text");

        let interval = setInterval(() => {
          bar.style.width = `${progress++}%`;
          text.textContent = `${progress++}%`;
          if (progress > 100) {
            text.textContent = "Download Complete";
            alerter();
            clearInterval(interval);
          }
        }, 50);
      }

      function alerter() {
        let alertbanner = document.querySelector(".alertbanner");
        alertbanner.style.top = "10%";
        alertbanner.style.opacity = 1;
        setTimeout(() => {
          alertbanner.style.top = "-120px";
          alertbanner.style.opacity = 0;
        }, 3000);
      }
    </script>
  </body>
</html>
